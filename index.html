<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歌单</title>
<style>
  :root {
    --bg-deep: #0b0e1f;
    --bg-mid: #171233;
    --bg-highlight: #1c1840;
    --controls-bg: rgba(11, 14, 31, 0.82);
    --accent-star: #c9c3ff;
    --text-main: #eae7ff;
    --text-dim: #8b87ad;
    --letter-ghost: rgba(200, 195, 240, 0.08);
    --card-bg: rgba(255, 255, 255, 0.035);
    --card-border: rgba(200, 195, 240, 0.12);
    --serif: 'Georgia', 'Noto Serif SC', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }

  /* 每周五(北京时间)的限定主题色 · 樱花粉 */
  body.friday-theme {
    --bg-deep: #2a1620;
    --bg-mid: #3a2130;
    --bg-highlight: #45283a;
    --controls-bg: rgba(58, 33, 48, 0.82);
    --accent-star: #f2b8d1;
    --text-main: #fbeaf3;
    --text-dim: #c98aa8;
    --letter-ghost: rgba(242, 184, 209, 0.12);
    --card-border: rgba(242, 184, 209, 0.2);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: var(--sans);
    background: radial-gradient(ellipse at 20% 0%, var(--bg-highlight) 0%, var(--bg-deep) 55%);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* starfield */
  #stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .header {
    position: relative;
    z-index: 1;
    padding: 64px 24px 32px;
    text-align: center;
  }

  .header h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 2.4rem;
    letter-spacing: 0.04em;
    margin: 0 0 8px;
    color: var(--text-main);
  }

  .header p {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin: 0;
    letter-spacing: 0.02em;
  }

  .controls {
    position: sticky;
    top: 0;
    z-index: 5;
    background: var(--controls-bg);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--card-border);
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
  }

  .search-box {
    width: 100%;
    max-width: 420px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 10px 16px;
    border-radius: 999px;
    border: 1px solid var(--card-border);
    background: rgba(255,255,255,0.04);
    color: var(--text-main);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus {
    border-color: var(--accent-star);
  }

  .search-box input::placeholder {
    color: var(--text-dim);
  }

  .category-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 720px;
  }

  .cat-btn {
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--card-border);
    background: transparent;
    color: var(--text-dim);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--serif);
    letter-spacing: 0.05em;
  }

  .cat-btn:hover {
    border-color: var(--accent-star);
    color: var(--text-main);
  }

  .cat-btn.active {
    background: var(--accent-star);
    color: var(--bg-deep);
    border-color: var(--accent-star);
    font-weight: 600;
  }

  main {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 120px;
  }

  .section {
    position: relative;
    margin-bottom: 56px;
  }

  .section-letter {
    position: absolute;
    right: -8px;
    top: -30px;
    font-family: var(--serif);
    font-size: 7rem;
    color: var(--letter-ghost);
    line-height: 1;
    user-select: none;
    pointer-events: none;
  }

  .section-title {
    font-family: var(--serif);
    font-size: 1rem;
    color: var(--text-dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin: 0 0 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--card-border);
  }

  .song-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
    position: relative;
  }

  .song-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    transition: border-color 0.2s, transform 0.15s;
  }

  .song-card:hover {
    border-color: var(--accent-star);
    transform: translateY(-1px);
  }

  .song-title {
    font-size: 0.92rem;
    color: var(--text-main);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .song-price {
    font-size: 0.75rem;
    color: var(--text-dim);
    white-space: nowrap;
    font-family: var(--serif);
    opacity: 0.7;
  }

  .empty-state {
    text-align: center;
    color: var(--text-dim);
    padding: 60px 20px;
    font-size: 0.95rem;
  }

  .count-badge {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.8rem;
    margin-bottom: 24px;
    letter-spacing: 0.05em;
  }

  /* Chat widget */
  #chat-toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 10;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: var(--accent-star);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(201, 195, 255, 0.35);
    transition: transform 0.2s;
  }

  #chat-toggle:hover {
    transform: scale(1.06);
  }

  #chat-toggle svg {
    width: 24px;
    height: 24px;
    fill: var(--bg-deep);
  }

  #chat-panel {
    position: fixed;
    bottom: 90px;
    right: 24px;
    z-index: 10;
    width: 340px;
    max-width: calc(100vw - 48px);
    height: 460px;
    max-height: calc(100vh - 140px);
    background: var(--bg-mid);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    display: none;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }

  #chat-panel.open {
    display: flex;
  }

  .chat-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--card-border);
    font-family: var(--serif);
    font-size: 0.95rem;
    color: var(--text-main);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .chat-header .close-btn {
    cursor: pointer;
    color: var(--text-dim);
    background: none;
    border: none;
    font-size: 1.1rem;
    line-height: 1;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg {
    max-width: 85%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 0.85rem;
    line-height: 1.45;
  }

  .msg.user {
    align-self: flex-end;
    background: var(--accent-star);
    color: var(--bg-deep);
    border-bottom-right-radius: 3px;
  }

  .msg.bot {
    align-self: flex-start;
    background: rgba(255,255,255,0.06);
    color: var(--text-main);
    border-bottom-left-radius: 3px;
  }

  .msg.bot.loading {
    color: var(--text-dim);
    font-style: italic;
  }

  .chat-input-row {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--card-border);
  }

  .chat-input-row input {
    flex: 1;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--card-border);
    background: rgba(255,255,255,0.04);
    color: var(--text-main);
    font-size: 0.85rem;
    outline: none;
  }

  .chat-input-row input:focus {
    border-color: var(--accent-star);
  }

  .chat-input-row button {
    background: var(--accent-star);
    border: none;
    color: var(--bg-deep);
    border-radius: 999px;
    padding: 0 16px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }

  .chat-hint {
    padding: 8px 16px 0;
    font-size: 0.72rem;
    color: var(--text-dim);
  }

  @media (max-width: 600px) {
    .section-letter { font-size: 4.5rem; top: -20px; }
    .header h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="header">
  <h1>我的歌单</h1>
  <p>按拼音首字母分类 · 点击标签筛选 · 或直接搜索</p>
</div>

<div class="controls">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索歌名...">
  </div>
  <div class="category-nav" id="categoryNav"></div>
</div>

<main>
  <div class="count-badge" id="countBadge"></div>
  <div id="songContainer"><div class="empty-state">加载中...</div></div>
</main>

<button id="chat-toggle" aria-label="打开问答助手">
  <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.38 5.07L2 22l4.93-1.38C8.42 21.5 10.15 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.66 0-3.22-.45-4.55-1.24l-.33-.2-3.11.87.87-3.11-.2-.33C4.45 14.22 4 12.66 4 11c0-4.42 3.58-8 8-8s8 3.58 8 8-3.58 9-8 9z"/></svg>
</button>

<div id="chat-panel">
  <div class="chat-header">
    <span>问问这个歌单</span>
    <button class="close-btn" id="chatClose">✕</button>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="msg bot">你好!可以问我吃吃会不会&lt;歌名&gt;,或&lt;歌名&gt;需不需要加钱。价格信息目前还没录入,问到价格我会如实告诉你暂时没有这个数据。如果不在Claude环境此功能暂时不可用。</div>
  </div>
  <div class="chat-hint">demo 版本 · 回答仅基于当前歌单数据</div>
  <div class="chat-input-row">
    <input type="text" id="chatInput" placeholder="问点什么...">
    <button id="chatSend">发送</button>
  </div>
</div>

<script>
// ---------- Data source ----------
// 歌单数据放在同目录下的 songs.csv 里,直接在 GitHub 网页上编辑这个文件
// (打开 songs.csv → 点右上角铅笔图标 → 改完提交)就能更新歌单,不用碰这份代码。
const DATA_URL = "songs.csv";

let SONGS = {};
let ALL_SONGS = [];

function parseCSV(text) {
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else if (c === '"') {
      inQuotes = true;
    } else if (c === ",") {
      row.push(field); field = "";
    } else if (c === "\n" || c === "\r") {
      if (c === "\r" && text[i + 1] === "\n") i++;
      row.push(field); field = "";
      if (row.length > 1 || row[0] !== "") rows.push(row);
      row = [];
    } else {
      field += c;
    }
  }
  if (field !== "" || row.length) { row.push(field); rows.push(row); }
  return rows;
}

async function loadSongs() {
  const res = await fetch(DATA_URL);
  if (!res.ok) throw new Error(`csv fetch failed: ${res.status}`);
  const text = await res.text();
  const rows = parseCSV(text);
  const [header, ...body] = rows;
  const catIdx = header.findIndex(h => h.trim() === "分类");
  const titleIdx = header.findIndex(h => h.trim() === "歌名");
  const priceIdx = header.findIndex(h => h.trim() === "价格");
  if (catIdx === -1 || titleIdx === -1) {
    throw new Error("表头缺少 分类 或 歌名 列");
  }

  const grouped = {};
  body.forEach(r => {
    const cat = (r[catIdx] || "").trim();
    const title = (r[titleIdx] || "").trim();
    if (!title) return;
    const priceRaw = (r[priceIdx] || "").trim();
    const price = priceRaw === "" ? null : priceRaw;
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push({ title, price });
  });

  const sortedCats = Object.keys(grouped).sort((a, b) => a.localeCompare(b, "zh"));
  SONGS = {};
  sortedCats.forEach(c => { SONGS[c] = grouped[c]; });
  ALL_SONGS = sortedCats.flatMap(cat => SONGS[cat].map(s => ({ ...s, category: cat })));
}

// ---------- State ----------
let state = {
  activeCategory: "all",
  searchQuery: ""
};

// ---------- Render ----------
function getVisibleSongs() {
  return ALL_SONGS.filter(s => {
    const matchCat = state.activeCategory === "all" || s.category === state.activeCategory;
    const matchSearch = s.title.toLowerCase().includes(state.searchQuery.toLowerCase());
    return matchCat && matchSearch;
  });
}

function renderCategoryNav() {
  const nav = document.getElementById("categoryNav");
  const cats = ["all", ...Object.keys(SONGS)];
  nav.innerHTML = cats.map(c => {
    const label = c === "all" ? "全部" : c;
    const active = state.activeCategory === c ? "active" : "";
    return `<button class="cat-btn ${active}" data-cat="${c}">${label}</button>`;
  }).join("");

  nav.querySelectorAll(".cat-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.activeCategory = btn.dataset.cat;
      renderCategoryNav();
      renderSongs();
    });
  });
}

function renderSongs() {
  const container = document.getElementById("songContainer");
  const countBadge = document.getElementById("countBadge");
  const visible = getVisibleSongs();

  countBadge.textContent = `共 ${visible.length} 首`;

  if (visible.length === 0) {
    container.innerHTML = `<div class="empty-state">没有找到匹配的歌曲</div>`;
    return;
  }

  if (state.searchQuery || state.activeCategory !== "all") {
    // flat view when filtering/searching
    container.innerHTML = `
      <div class="song-grid">
        ${visible.map(renderCard).join("")}
      </div>
    `;
  } else {
    // grouped by category, alphabetical
    container.innerHTML = Object.keys(SONGS).map(cat => `
      <div class="section">
        <div class="section-letter">${cat}</div>
        <div class="section-title">${cat}</div>
        <div class="song-grid">
          ${SONGS[cat].map(s => renderCard({ ...s, category: cat })).join("")}
        </div>
      </div>
    `).join("");
  }
}

function renderCard(s) {
  const priceLabel = s.price === null ? "" : `高能：${s.price}`;
  return `
    <div class="song-card">
      <span class="song-title" title="${s.title}">${s.title}</span>
      <span class="song-price">${priceLabel}</span>
    </div>
  `;
}

document.getElementById("searchInput").addEventListener("input", (e) => {
  state.searchQuery = e.target.value.trim();
  renderSongs();
});

// ---------- Starfield background ----------
function initStars() {
  const canvas = document.getElementById("stars");
  const ctx = canvas.getContext("2d");
  let w, h, stars;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    const count = Math.floor((w * h) / 9000);
    stars = Array.from({ length: count }, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      r: Math.random() * 1.2 + 0.2,
      alpha: Math.random() * 0.6 + 0.2,
      twinkleSpeed: Math.random() * 0.015 + 0.005,
      phase: Math.random() * Math.PI * 2
    }));
  }

  const starColor = getComputedStyle(document.body).getPropertyValue("--accent-star").trim();

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = starColor;
    stars.forEach(s => {
      const a = s.alpha * (0.6 + 0.4 * Math.sin(t * s.twinkleSpeed + s.phase));
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    t += 1;
    requestAnimationFrame(draw);
  }

  window.addEventListener("resize", resize);
  resize();
  draw();
}

// ---------- Chat widget ----------
const chatToggle = document.getElementById("chat-toggle");
const chatPanel = document.getElementById("chat-panel");
const chatClose = document.getElementById("chatClose");
const chatMessages = document.getElementById("chatMessages");
const chatInput = document.getElementById("chatInput");
const chatSend = document.getElementById("chatSend");

chatToggle.addEventListener("click", () => {
  chatPanel.classList.toggle("open");
});
chatClose.addEventListener("click", () => {
  chatPanel.classList.remove("open");
});

function appendMessage(text, role) {
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

async function askAboutSongs(question) {
  const context = ALL_SONGS.map(s => `${s.title} [分类:${s.category}] 价格:${s.price === null ? "待定" : "¥" + s.price}`).join("\n");

  const systemPrompt = `你是一个歌单问答助手。你只能根据下面提供的歌单数据回答问题,不要编造歌单里没有的信息。
如果某首歌的价格显示"待定",如实说明这首歌的价格还没有录入,不要编造具体数字。
如果问的歌不在列表里,直接说没有这首歌。
如果问题和这个歌单完全无关,礼貌说明你只能回答关于这个歌单的问题。
回答尽量简短、直接。

歌单数据:
${context}`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 500,
      messages: [
        { role: "user", content: systemPrompt + "\n\n问题:" + question }
      ]
    })
  });

  const data = await response.json();
  const textBlocks = (data.content || []).filter(b => b.type === "text").map(b => b.text);
  return textBlocks.join("\n") || "抱歉,暂时没能获取到回答。";
}

async function handleSend() {
  const question = chatInput.value.trim();
  if (!question) return;
  appendMessage(question, "user");
  chatInput.value = "";

  const loadingEl = appendMessage("思考中...", "bot loading");

  try {
    const answer = await askAboutSongs(question);
    loadingEl.textContent = answer;
    loadingEl.classList.remove("loading");
  } catch (err) {
    loadingEl.textContent = "出错了,请稍后再试。";
    loadingEl.classList.remove("loading");
  }
}

chatSend.addEventListener("click", handleSend);
chatInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") handleSend();
});

// ---------- Friday theme ----------
function isFridayInBeijing() {
  const beijingNow = new Date(Date.now() + 8 * 3600000);
  return beijingNow.getUTCDay() === 5;
}

if (isFridayInBeijing()) {
  document.body.classList.add("friday-theme");
}

// ---------- Init ----------
async function init() {
  initStars();
  try {
    await loadSongs();
    renderCategoryNav();
    renderSongs();
  } catch (err) {
    console.error(err);
    document.getElementById("songContainer").innerHTML =
      `<div class="empty-state">歌单数据加载失败,请稍后刷新重试。</div>`;
  }
}
init();
</script>
</body>
</html>
