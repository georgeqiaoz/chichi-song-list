<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歌单</title>
<style>
  :root {
    --bg-deep: #0b0e1f;
    --bg-mid: #171233;
    --accent-star: #c9c3ff;
    --text-main: #eae7ff;
    --text-dim: #8b87ad;
    --letter-ghost: rgba(200, 195, 240, 0.08);
    --card-bg: rgba(255, 255, 255, 0.035);
    --card-border: rgba(200, 195, 240, 0.12);
    --serif: 'Georgia', 'Noto Serif SC', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: var(--sans);
    background: radial-gradient(ellipse at 20% 0%, #1c1840 0%, var(--bg-deep) 55%);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* starfield */
  #stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .header {
    position: relative;
    z-index: 1;
    padding: 64px 24px 32px;
    text-align: center;
  }

  .header h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 2.4rem;
    letter-spacing: 0.04em;
    margin: 0 0 8px;
    color: var(--text-main);
  }

  .header p {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin: 0;
    letter-spacing: 0.02em;
  }

  .controls {
    position: sticky;
    top: 0;
    z-index: 5;
    background: rgba(11, 14, 31, 0.82);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--card-border);
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
  }

  .search-box {
    width: 100%;
    max-width: 420px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 10px 16px;
    border-radius: 999px;
    border: 1px solid var(--card-border);
    background: rgba(255,255,255,0.04);
    color: var(--text-main);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus {
    border-color: var(--accent-star);
  }

  .search-box input::placeholder {
    color: var(--text-dim);
  }

  .category-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 720px;
  }

  .cat-btn {
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--card-border);
    background: transparent;
    color: var(--text-dim);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--serif);
    letter-spacing: 0.05em;
  }

  .cat-btn:hover {
    border-color: var(--accent-star);
    color: var(--text-main);
  }

  .cat-btn.active {
    background: var(--accent-star);
    color: var(--bg-deep);
    border-color: var(--accent-star);
    font-weight: 600;
  }

  main {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 120px;
  }

  .section {
    position: relative;
    margin-bottom: 56px;
  }

  .section-letter {
    position: absolute;
    right: -8px;
    top: -30px;
    font-family: var(--serif);
    font-size: 7rem;
    color: var(--letter-ghost);
    line-height: 1;
    user-select: none;
    pointer-events: none;
  }

  .section-title {
    font-family: var(--serif);
    font-size: 1rem;
    color: var(--text-dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin: 0 0 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--card-border);
  }

  .song-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
    position: relative;
  }

  .song-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    transition: border-color 0.2s, transform 0.15s;
  }

  .song-card:hover {
    border-color: var(--accent-star);
    transform: translateY(-1px);
  }

  .song-title {
    font-size: 0.92rem;
    color: var(--text-main);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .song-price {
    font-size: 0.75rem;
    color: var(--text-dim);
    white-space: nowrap;
    font-family: var(--serif);
    opacity: 0.7;
  }

  .empty-state {
    text-align: center;
    color: var(--text-dim);
    padding: 60px 20px;
    font-size: 0.95rem;
  }

  .count-badge {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.8rem;
    margin-bottom: 24px;
    letter-spacing: 0.05em;
  }

  /* Chat widget */
  #chat-toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 10;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: var(--accent-star);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(201, 195, 255, 0.35);
    transition: transform 0.2s;
  }

  #chat-toggle:hover {
    transform: scale(1.06);
  }

  #chat-toggle svg {
    width: 24px;
    height: 24px;
    fill: var(--bg-deep);
  }

  #chat-panel {
    position: fixed;
    bottom: 90px;
    right: 24px;
    z-index: 10;
    width: 340px;
    max-width: calc(100vw - 48px);
    height: 460px;
    max-height: calc(100vh - 140px);
    background: var(--bg-mid);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    display: none;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }

  #chat-panel.open {
    display: flex;
  }

  .chat-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--card-border);
    font-family: var(--serif);
    font-size: 0.95rem;
    color: var(--text-main);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .chat-header .close-btn {
    cursor: pointer;
    color: var(--text-dim);
    background: none;
    border: none;
    font-size: 1.1rem;
    line-height: 1;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg {
    max-width: 85%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 0.85rem;
    line-height: 1.45;
  }

  .msg.user {
    align-self: flex-end;
    background: var(--accent-star);
    color: var(--bg-deep);
    border-bottom-right-radius: 3px;
  }

  .msg.bot {
    align-self: flex-start;
    background: rgba(255,255,255,0.06);
    color: var(--text-main);
    border-bottom-left-radius: 3px;
  }

  .msg.bot.loading {
    color: var(--text-dim);
    font-style: italic;
  }

  .chat-input-row {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--card-border);
  }

  .chat-input-row input {
    flex: 1;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--card-border);
    background: rgba(255,255,255,0.04);
    color: var(--text-main);
    font-size: 0.85rem;
    outline: none;
  }

  .chat-input-row input:focus {
    border-color: var(--accent-star);
  }

  .chat-input-row button {
    background: var(--accent-star);
    border: none;
    color: var(--bg-deep);
    border-radius: 999px;
    padding: 0 16px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }

  .chat-hint {
    padding: 8px 16px 0;
    font-size: 0.72rem;
    color: var(--text-dim);
  }

  @media (max-width: 600px) {
    .section-letter { font-size: 4.5rem; top: -20px; }
    .header h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="header">
  <h1>我的歌单</h1>
  <p>按拼音首字母分类 · 点击标签筛选 · 或直接搜索</p>
</div>

<div class="controls">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索歌名...">
  </div>
  <div class="category-nav" id="categoryNav"></div>
</div>

<main>
  <div class="count-badge" id="countBadge"></div>
  <div id="songContainer"></div>
</main>

<button id="chat-toggle" aria-label="打开问答助手">
  <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.38 5.07L2 22l4.93-1.38C8.42 21.5 10.15 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.66 0-3.22-.45-4.55-1.24l-.33-.2-3.11.87.87-3.11-.2-.33C4.45 14.22 4 12.66 4 11c0-4.42 3.58-8 8-8s8 3.58 8 8-3.58 9-8 9z"/></svg>
</button>

<div id="chat-panel">
  <div class="chat-header">
    <span>问问这个歌单</span>
    <button class="close-btn" id="chatClose">✕</button>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="msg bot">你好!可以问我"有没有xxx这首歌"之类的问题。价格信息目前还没录入,问到价格我会如实告诉你暂时没有这个数据。</div>
  </div>
  <div class="chat-hint">demo 版本 · 回答仅基于当前歌单数据</div>
  <div class="chat-input-row">
    <input type="text" id="chatInput" placeholder="问点什么...">
    <button id="chatSend">发送</button>
  </div>
</div>

<script>
// ---------- Data ----------
// price: null = placeholder, not yet filled in
function song(title) {
  return { title, price: null };
}

const SONGS = {
  "A": ["暗号","暗香","安静","爱一点","爱的魔法","爱的天国","爱如潮水","爱似水仙","爱丫爱丫","爱你离开","A.I.N.Y","爱的天灵灵","爱久见人心","爱就一个字","爱笑的眼睛","爱要坦荡荡","爱你一兆年","爱你不是两三天","爱了很久的朋友","爱是奖励还是惩罚","A MOMENT LIKE THIS"],
  "B": ["半空","不该","宝贝","不枉","半情歌","布谷鸟","不应该","白白的","百年孤寂","不眠之夜","把耳朵叫醒","贝加尔湖畔","背对背拥抱","别找我麻烦","不跟你好了","B小调雨后","白鸟过河滩","编号89757","北极星的眼泪","BA BA BA","不要伤心我的宝贝"],
  "C": ["彩虹","偿还","翅膀","传奇","车站","蝉女","崇拜(梁)","猜不透","从前说","从前慢","敕勒川","超能力","丑八怪","匆匆那年","词不达意","彩虹的微笑","城里的月光","出现又离开","春夏秋冬的你","从一道缝隙看黄昏","C'EST LA VIE","CAN YOU FEEL MY WORLD"],
  "D": ["大鱼","当你","倒带","稻香","倒数","带我走","胆小鬼","第一次","第一天","独角戏","第三人","等你下课","电台情歌","帝江混沌","二十二(陶喆)","但愿人长久","当爱在靠近","踮起脚尖爱","等下一个他","第一次爱的人","等到世界颠倒","DEAR FRIEND"],
  "F": ["枫","恶作剧","发如雪","复活节","飞云之下","分手快乐","非你不爱","反方向的钟","风起时想你","FLY AWAY"],
  "G": ["搁浅","过火","光亮","归零","公主病","过不去","告白气球","勾指起誓","光年之外","孤独颂歌","光的方向","古德奈先生","孤单北半球","给我一个吻","给我一个理由忘记"],
  "H": ["花","红豆","后来","花园","幻想","海底","画情","好听","红玫瑰","黄昏晓","回娘家","哈哈哈","好想好想","黑色毛衣","呼吸决定","忽然之间","花的嫁纱","蝴蝶泉边","HONEY","还是好朋友","很爱很爱你","会呼吸的痛","会开花的云","化身孤岛的鲸","回不去的从前","还是你的笑容最可爱"]
};

const ALL_SONGS = Object.entries(SONGS).flatMap(([cat, titles]) =>
  titles.map(t => ({ ...song(t), category: cat }))
);

// ---------- State ----------
let state = {
  activeCategory: "all",
  searchQuery: ""
};

// ---------- Render ----------
function getVisibleSongs() {
  return ALL_SONGS.filter(s => {
    const matchCat = state.activeCategory === "all" || s.category === state.activeCategory;
    const matchSearch = s.title.toLowerCase().includes(state.searchQuery.toLowerCase());
    return matchCat && matchSearch;
  });
}

function renderCategoryNav() {
  const nav = document.getElementById("categoryNav");
  const cats = ["all", ...Object.keys(SONGS)];
  nav.innerHTML = cats.map(c => {
    const label = c === "all" ? "全部" : c;
    const active = state.activeCategory === c ? "active" : "";
    return `<button class="cat-btn ${active}" data-cat="${c}">${label}</button>`;
  }).join("");

  nav.querySelectorAll(".cat-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.activeCategory = btn.dataset.cat;
      renderCategoryNav();
      renderSongs();
    });
  });
}

function renderSongs() {
  const container = document.getElementById("songContainer");
  const countBadge = document.getElementById("countBadge");
  const visible = getVisibleSongs();

  countBadge.textContent = `共 ${visible.length} 首`;

  if (visible.length === 0) {
    container.innerHTML = `<div class="empty-state">没有找到匹配的歌曲</div>`;
    return;
  }

  if (state.searchQuery || state.activeCategory !== "all") {
    // flat view when filtering/searching
    container.innerHTML = `
      <div class="song-grid">
        ${visible.map(renderCard).join("")}
      </div>
    `;
  } else {
    // grouped by category, alphabetical
    container.innerHTML = Object.keys(SONGS).map(cat => `
      <div class="section">
        <div class="section-letter">${cat}</div>
        <div class="section-title">${cat}</div>
        <div class="song-grid">
          ${SONGS[cat].map(t => renderCard({ title: t, price: null, category: cat })).join("")}
        </div>
      </div>
    `).join("");
  }
}

function renderCard(s) {
  const priceLabel = s.price === null ? "价格 · 待定" : `¥${s.price}`;
  return `
    <div class="song-card">
      <span class="song-title" title="${s.title}">${s.title}</span>
      <span class="song-price">${priceLabel}</span>
    </div>
  `;
}

document.getElementById("searchInput").addEventListener("input", (e) => {
  state.searchQuery = e.target.value.trim();
  renderSongs();
});

// ---------- Starfield background ----------
function initStars() {
  const canvas = document.getElementById("stars");
  const ctx = canvas.getContext("2d");
  let w, h, stars;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    const count = Math.floor((w * h) / 9000);
    stars = Array.from({ length: count }, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      r: Math.random() * 1.2 + 0.2,
      alpha: Math.random() * 0.6 + 0.2,
      twinkleSpeed: Math.random() * 0.015 + 0.005,
      phase: Math.random() * Math.PI * 2
    }));
  }

  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "#c9c3ff";
    stars.forEach(s => {
      const a = s.alpha * (0.6 + 0.4 * Math.sin(t * s.twinkleSpeed + s.phase));
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    t += 1;
    requestAnimationFrame(draw);
  }

  window.addEventListener("resize", resize);
  resize();
  draw();
}

// ---------- Chat widget ----------
const chatToggle = document.getElementById("chat-toggle");
const chatPanel = document.getElementById("chat-panel");
const chatClose = document.getElementById("chatClose");
const chatMessages = document.getElementById("chatMessages");
const chatInput = document.getElementById("chatInput");
const chatSend = document.getElementById("chatSend");

chatToggle.addEventListener("click", () => {
  chatPanel.classList.toggle("open");
});
chatClose.addEventListener("click", () => {
  chatPanel.classList.remove("open");
});

function appendMessage(text, role) {
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

async function askAboutSongs(question) {
  const context = ALL_SONGS.map(s => `${s.title} [分类:${s.category}] 价格:待定`).join("\n");

  const systemPrompt = `你是一个歌单问答助手。你只能根据下面提供的歌单数据回答问题,不要编造歌单里没有的信息。
如果被问到价格,如实说明目前歌单里的价格信息还是占位符,尚未录入,不要编造具体数字。
如果问的歌不在列表里,直接说没有这首歌。
如果问题和这个歌单完全无关,礼貌说明你只能回答关于这个歌单的问题。
回答尽量简短、直接。

歌单数据:
${context}`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 500,
      messages: [
        { role: "user", content: systemPrompt + "\n\n问题:" + question }
      ]
    })
  });

  const data = await response.json();
  const textBlocks = (data.content || []).filter(b => b.type === "text").map(b => b.text);
  return textBlocks.join("\n") || "抱歉,暂时没能获取到回答。";
}

async function handleSend() {
  const question = chatInput.value.trim();
  if (!question) return;
  appendMessage(question, "user");
  chatInput.value = "";

  const loadingEl = appendMessage("思考中...", "bot loading");

  try {
    const answer = await askAboutSongs(question);
    loadingEl.textContent = answer;
    loadingEl.classList.remove("loading");
  } catch (err) {
    loadingEl.textContent = "出错了,请稍后再试。";
    loadingEl.classList.remove("loading");
  }
}

chatSend.addEventListener("click", handleSend);
chatInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") handleSend();
});

// ---------- Init ----------
renderCategoryNav();
renderSongs();
initStars();
</script>
</body>
</html>
